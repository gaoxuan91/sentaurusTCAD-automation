# 第一阶段几何参数模板
# 2026/04/17

geometry:
  # ========== 基础几何（第一阶段必须有）==========
  bulk:
    length_nm: 500        # 长度方向（电极间距方向）
    height_nm: 200        # 高度方向
    unit: nm

  electrode:
    anode:
      position: left
      thickness_nm: 10
      material: Metal
    cathode:
      position: right
      thickness_nm: 10
      material: Metal

  # ========== TB 几何（第一阶段必须有）==========
  tb:
    width_nm: 3.0          # TB 窄区域宽度

  # ========== GB 几何（第一阶段后置）==========
  gb:
    width_nm: 5.0          # TODO: GB 宽度待定

# ========== 参数版本跟踪 ==========
param_version:
  geometry_version: "v1.0"
  source: "Initial setup"
  notes: "几何参数已通过 SDE 验证"
  last_updated: "2026/04/17"
